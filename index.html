<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Recuerda por qué lo haces</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --dark: #070b12;
      --dark-2: #0f1520;
      --dark-3: #141c2a;
      --glass: rgba(255,255,255,0.035);
      --glass-border: rgba(255,255,255,0.07);
      --text: #ede5d5;
      --text-muted: rgba(237,229,213,0.45);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── FONDO ── */
    .bg-layer { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(90px); opacity: 0.15;
      animation: drift 14s ease-in-out infinite alternate;
    }
    .orb-1 { width: 550px; height: 550px; background: radial-gradient(circle, #c9a84c, transparent); top: -140px; left: -140px; animation-delay: 0s; }
    .orb-2 { width: 420px; height: 420px; background: radial-gradient(circle, #2a4a70, transparent); bottom: -100px; right: -100px; animation-delay: -5s; }
    .orb-3 { width: 320px; height: 320px; background: radial-gradient(circle, #6b1a4a, transparent); top: 45%; left: 55%; animation-delay: -9s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(50px,35px) scale(1.12); } }

    .particles { position: absolute; inset: 0; }
    .particle {
      position: absolute; border-radius: 50%;
      background: var(--gold); opacity: 0;
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0); opacity: 0; }
      10% { opacity: 0.35; }
      90% { opacity: 0.08; }
      100% { transform: translateY(-20px) scale(1); opacity: 0; }
    }

    .stars { position: absolute; inset: 0; }
    .star { position: absolute; border-radius: 50%; background: white; animation: twinkle ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.15;transform:scale(1);} 50%{opacity:0.8;transform:scale(1.5);} }

    /* ── PÁGINA ── */
    .page {
      position: relative; z-index: 1;
      max-width: 460px; margin: 0 auto;
      padding: 52px 18px 70px;
      display: flex; flex-direction: column; align-items: center; gap: 36px;
    }

    /* ── HEADER ── */
    .header { text-align: center; width: 100%; }
    .eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 10.5px; font-weight: 500; letter-spacing: 0.32em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 16px; opacity: 0;
      animation: fadeUp 0.9s ease 0.2s forwards;
    }
    .eyebrow-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); opacity: 0.6; }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(29px, 8.5vw, 40px); font-weight: 700;
      line-height: 1.12; color: var(--text);
      opacity: 0; animation: fadeUp 0.9s ease 0.4s forwards;
    }
    .title em { font-style: italic; color: var(--gold-light); }
    .header-line {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; margin-top: 20px;
      opacity: 0; animation: fadeUp 0.9s ease 0.6s forwards;
    }
    .line-seg { flex: 1; max-width: 70px; height: 1px; background: linear-gradient(to right, transparent, var(--gold)); }
    .line-seg.right { background: linear-gradient(to left, transparent, var(--gold)); }
    .line-diamond { width: 6px; height: 6px; border: 1px solid var(--gold); transform: rotate(45deg); opacity: 0.8; }

    /* ── GALERÍA 4 FOTOS ── */
    .gallery {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 175px 155px;
      gap: 9px;
      opacity: 0; animation: fadeUp 0.9s ease 0.75s forwards;
    }
    .photo-frame {
      position: relative; overflow: hidden;
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), box-shadow 0.4s;
    }
    .photo-frame:nth-child(1) { border-radius: 24px 12px 12px 12px; }
    .photo-frame:nth-child(2) { border-radius: 12px 24px 12px 12px; }
    .photo-frame:nth-child(3) { border-radius: 12px 12px 12px 24px; }
    .photo-frame:nth-child(4) { border-radius: 12px 12px 24px 12px; }
    .photo-frame:hover {
      transform: scale(1.045) translateY(-4px);
      box-shadow: 0 22px 55px rgba(0,0,0,0.75), 0 0 0 1.5px var(--gold);
      z-index: 2;
    }
    .photo-frame img {
      width: 100%; height: 100%; object-fit: cover;
      filter: saturate(0.82) contrast(1.06) brightness(0.95);
      transition: filter 0.45s, transform 0.5s;
    }
    .photo-frame:hover img { filter: saturate(1.15) contrast(1.08) brightness(1); transform: scale(1.09); }
    .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(160deg, rgba(201,168,76,0.04) 0%, transparent 40%, rgba(7,11,18,0.55) 100%);
      pointer-events: none;
    }
    .photo-num {
      position: absolute; bottom: 9px; right: 11px;
      font-size: 10px; letter-spacing: 0.15em; color: rgba(240,208,128,0.5);
      font-weight: 500; pointer-events: none;
    }

    /* ── SEPARADOR ── */
    .sep {
      width: 100%; display: flex; align-items: center; gap: 14px;
      opacity: 0; animation: fadeUp 0.9s ease 0.9s forwards;
    }
    .sep-line { flex: 1; height: 1px; background: var(--glass-border); }
    .sep-label {
      font-size: 10px; letter-spacing: 0.25em; text-transform: uppercase;
      color: var(--text-muted); white-space: nowrap;
    }

    /* ── TARJETA FRASE ── */
    .quote-card {
      width: 100%; position: relative;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 26px;
      padding: 38px 30px 32px;
      text-align: center;
      overflow: hidden;
      opacity: 0; animation: fadeUp 0.9s ease 1.0s forwards;
    }
    .quote-card::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 55%; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .quote-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: 26px;
      background: radial-gradient(ellipse at 50% -10%, rgba(201,168,76,0.08), transparent 65%);
      pointer-events: none;
    }
    .corner {
      position: absolute; width: 14px; height: 14px;
      border-color: var(--gold); border-style: solid; opacity: 0.35;
    }
    .corner.tl { top: 12px; left: 12px; border-width: 1px 0 0 1px; border-radius: 3px 0 0 0; }
    .corner.tr { top: 12px; right: 12px; border-width: 1px 1px 0 0; border-radius: 0 3px 0 0; }
    .corner.bl { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; border-radius: 0 0 0 3px; }
    .corner.br { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; border-radius: 0 0 3px 0; }

    .quote-mark {
      font-size: 56px; line-height: 0.7; color: var(--gold);
      opacity: 0.22; margin-bottom: 18px; display: block;
      font-family: Georgia, serif; user-select: none;
    }
    #message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(16px, 4.5vw, 20px);
      font-style: italic; font-weight: 400;
      line-height: 1.6; color: var(--text);
      transition: opacity 0.35s ease, transform 0.35s ease;
      min-height: 60px;
    }
    #message.fading { opacity: 0; transform: translateY(10px) scale(0.98); }
    .quote-bottom {
      margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .quote-dash { width: 24px; height: 1px; background: var(--gold); opacity: 0.5; }
    #quoteLabel {
      font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--gold); opacity: 0; transition: opacity 0.5s;
    }

    /* ── CONTADOR ── */
    .counter-row {
      width: 100%; display: flex; justify-content: center; gap: 28px;
      opacity: 0; animation: fadeUp 0.9s ease 1.1s forwards;
    }
    .counter-item { text-align: center; }
    .counter-num {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 700; color: var(--gold-light);
      display: block; line-height: 1;
    }
    .counter-lbl {
      font-size: 9.5px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text-muted); margin-top: 5px; display: block;
    }
    .counter-divider { width: 1px; background: var(--glass-border); align-self: stretch; }

    /* ── BOTÓN ── */
    .btn-wrap { opacity: 0; animation: fadeUp 0.9s ease 1.2s forwards; }
    .btn {
      position: relative; overflow: hidden;
      border: none; border-radius: 50px; cursor: pointer;
      padding: 17px 48px;
      background: linear-gradient(135deg, #8a6018, #c9a84c, #edd870, #c9a84c, #8a6018);
      background-size: 250% auto;
      color: #1a1000; font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 500; letter-spacing: 0.09em;
      text-transform: uppercase;
      box-shadow: 0 8px 30px rgba(201,168,76,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
      transition: transform 0.25s, box-shadow 0.25s, background-position 0.6s;
    }
    .btn:hover {
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 18px 45px rgba(201,168,76,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
      background-position: right center;
    }
    .btn:active { transform: scale(0.96); }
    .btn-shine {
      position: absolute; top: -50%; left: -80%; width: 50%; height: 200%;
      background: rgba(255,255,255,0.22); transform: skewX(-20deg);
      transition: left 0.55s;
    }
    .btn:hover .btn-shine { left: 150%; }

    /* ── HINT SHAKE ── */
    .shake-hint {
      display: flex; align-items: center; gap: 10px;
      font-size: 11.5px; letter-spacing: 0.06em; color: var(--text-muted);
      opacity: 0; animation: fadeUp 0.9s ease 1.4s forwards;
    }
    .shake-icon { font-size: 20px; animation: wiggle 2.8s ease-in-out infinite; }
    @keyframes wiggle {
      0%,100%{transform:rotate(0);}
      15%{transform:rotate(18deg);}
      30%{transform:rotate(-18deg);}
      45%{transform:rotate(12deg);}
      60%{transform:rotate(-8deg);}
      75%{transform:rotate(4deg);}
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: rgba(20,28,42,0.95);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 50px; padding: 11px 22px;
      font-size: 13px; color: var(--gold-light);
      backdrop-filter: blur(12px);
      transition: transform 0.45s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      opacity: 0; z-index: 99; white-space: nowrap;
      display: flex; align-items: center; gap: 8px;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--gold); animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{transform:scale(1);opacity:1;} 50%{transform:scale(1.7);opacity:0.4;} }

    /* ── RIPPLE ── */
    .ripple-container { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    .ripple {
      position: absolute; border-radius: 50%;
      border: 1.5px solid var(--gold); opacity: 0.8;
      animation: rippleAnim 0.9s ease-out forwards;
    }
    @keyframes rippleAnim { from{transform:scale(0);opacity:0.8;} to{transform:scale(7);opacity:0;} }

    @keyframes fadeUp { from{opacity:0;transform:translateY(22px);} to{opacity:1;transform:translateY(0);} }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
  </style>
</head>
<body>

<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="particles" id="particles"></div>
  <div class="stars" id="stars"></div>
</div>

<div class="ripple-container" id="rippleContainer"></div>

<div class="toast" id="toast">
  <div class="toast-dot"></div>
  Recuerda tu por qué
</div>

<div class="page">

  <div class="header">
    <p class="eyebrow">
      <span class="eyebrow-dot"></span>
      Tu razón de seguir
      <span class="eyebrow-dot"></span>
    </p>
    <h1 class="title">Recuerda por qué<br><em>lo haces</em></h1>
    <div class="header-line">
      <div class="line-seg"></div>
      <div class="line-diamond"></div>
      <div class="line-seg right"></div>
    </div>
  </div>

  <div class="gallery">
    <div class="photo-frame">
      <img src="fotos/WhatsApp Image 2026-03-25 at 4.21.33 PM.jpeg" alt="" loading="lazy">
      <div class="photo-overlay"></div>
      <span class="photo-num">01</span>
    </div>
    <div class="photo-frame">
      <img src="fotos/WhatsApp Image 2026-03-25 at 4.21.33 PM (1).jpeg" alt="" loading="lazy">
      <div class="photo-overlay"></div>
      <span class="photo-num">02</span>
    </div>
    <div class="photo-frame">
      <img src="fotos/WhatsApp Image 2026-03-25 at 4.21.33 PM (2).jpeg" alt="" loading="lazy">
      <div class="photo-overlay"></div>
      <span class="photo-num">03</span>
    </div>
    <div class="photo-frame">
      <img src="fotos/WhatsApp Image 2026-03-25 at 4.21.34 PM.jpeg" alt="" loading="lazy">
      <div class="photo-overlay"></div>
      <span class="photo-num">04</span>
    </div>
  </div>

  <div class="sep">
    <div class="sep-line"></div>
    <span class="sep-label">Tu fuerza interior</span>
    <div class="sep-line"></div>
  </div>

  <div class="quote-card">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <span class="quote-mark">"</span>
    <p id="message">Toca el botón o agita tu teléfono para recordar por qué sigues aquí.</p>
    <div class="quote-bottom">
      <div class="quote-dash"></div>
      <span id="quoteLabel"></span>
      <div class="quote-dash"></div>
    </div>
  </div>

  <div class="counter-row">
    <div class="counter-item">
      <span class="counter-num" id="cnt-dias">0</span>
      <span class="counter-lbl">días luchando</span>
    </div>
    <div class="counter-divider"></div>
    <div class="counter-item">
      <span class="counter-num" id="cnt-frases">0</span>
      <span class="counter-lbl">frases leídas</span>
    </div>
    <div class="counter-divider"></div>
    <div class="counter-item">
      <span class="counter-num">∞</span>
      <span class="counter-lbl">razones para seguir</span>
    </div>
  </div>

  <div class="btn-wrap">
    <button class="btn" onclick="getQuote(event)">
      <div class="btn-shine"></div>
      ✦ Recuérdamelo
    </button>
  </div>

  <div class="shake-hint">
    <span class="shake-icon">📳</span>
    <span>Agita tu teléfono para una nueva frase</span>
  </div>

</div>

<script>
  const frases = [
    { texto: "Recuerda por quién lo haces. Esas personas merecen verte llegar hasta el final.", label: "Para los que amas" },
    { texto: "Piensa en el día que dijiste 'lo voy a lograr'. Ese día todavía está contigo.", label: "Tu promesa" },
    { texto: "Hay alguien que te mira y aprende de ti cómo se enfrenta la vida. No te rindas.", label: "Tu ejemplo" },
    { texto: "¿Recuerdas por qué empezaste? Esa razón no desapareció. Solo se escondió detrás del cansancio.", label: "Tu origen" },
    { texto: "Sigue. No solo por el resultado, sino por la persona en que te estás convirtiendo.", label: "Tu crecimiento" },
    { texto: "Hay una versión tuya del futuro esperando que no te rindas hoy.", label: "Tu futuro yo" },
    { texto: "Cada vez que quisiste parar y no lo hiciste, te hiciste más grande.", label: "Tu fuerza" },
    { texto: "Recuerda a alguien que cree en ti más de lo que tú crees en ti mismo. Hazlo por ellos también.", label: "Los que creen en ti" },
    { texto: "El cansancio que sientes hoy es la prueba de que no te diste por vencido ayer.", label: "Tu resistencia" },
    { texto: "Sigue. Un día te voltearás y todo tendrá sentido. Ese día vale cada momento difícil.", label: "Tu propósito" },
    { texto: "No olvides de dónde vienes ni a dónde vas. Esa distancia se llama determinación.", label: "Tu camino" },
    { texto: "¿Por quién lo haces? Pronuncia ese nombre en silencio. Ahora ve y demuéstraselo.", label: "Tu razón" },
    { texto: "La versión de ti que se rinde nunca conocerá lo que estaba esperándote al final.", label: "Lo que te espera" },
    { texto: "Sigue aunque nadie te esté viendo. Tu esfuerzo es real aunque no haya aplausos.", label: "Tu constancia" },
    { texto: "Recuerda: el sacrificio de hoy es el orgullo de mañana.", label: "Tu recompensa" },
    { texto: "No te rindas en el capítulo más difícil. Es exactamente cuando la historia cambia.", label: "Tu historia" },
    { texto: "Hay algo dentro de ti que sabe que puedes. Escúchalo más fuerte que el miedo.", label: "Tu voz interior" },
    { texto: "Sigue por la persona que fuiste cuando lo soñaste por primera vez.", label: "Tu primer sueño" },
    { texto: "Cada día que avanzas, le demuestras a alguien que sí se puede. Tú eres esa prueba.", label: "Tu mensaje" },
    { texto: "Lo más difícil no es empezar. Es seguir cuando ya no tienes ganas. Y tú sigues.", label: "Tu valentía" },
    { texto: "Piensa en todo lo que ya superaste. Esa fortaleza no se fue, sigue en ti.", label: "Lo que ya lograste" },
    { texto: "Sigue, aunque hoy sea solo un pequeño paso. Los pasos pequeños también llegan lejos.", label: "Tu avance" },
    { texto: "¿Por qué sigues? Porque en el fondo sabes que lo que buscas vale más que cualquier excusa.", label: "Tu convicción" },
    { texto: "No lo haces solo por ti. Lo haces por todos los que alguna vez creyeron en tu nombre.", label: "Tu legado" },
    { texto: "Cuando dudes, vuelve a tu razón más profunda. Esa nunca miente.", label: "Tu verdad" },
  ];

  let frasesLeidas = parseInt(localStorage.getItem('fl') || '0');
  let ultimoIdx = -1;

  let primerDia = localStorage.getItem('pd');
  if (!primerDia) { primerDia = Date.now(); localStorage.setItem('pd', primerDia); }
  const dias = Math.floor((Date.now() - parseInt(primerDia)) / 86400000) + 1;

  function animCount(el, target, ms) {
    if (target === 0) return;
    let v = 0;
    const step = Math.max(1, Math.ceil(target / (ms / 16)));
    const t = setInterval(() => {
      v = Math.min(v + step, target);
      el.textContent = v;
      if (v >= target) clearInterval(t);
    }, 16);
  }

  window.addEventListener('DOMContentLoaded', () => {
    setTimeout(() => {
      animCount(document.getElementById('cnt-dias'), dias, 1200);
      animCount(document.getElementById('cnt-frases'), frasesLeidas, 900);
    }, 1500);
  });

  function getQuote(event) {
    let idx;
    do { idx = Math.floor(Math.random() * frases.length); } while (idx === ultimoIdx);
    ultimoIdx = idx;
    const f = frases[idx];

    const el = document.getElementById('message');
    const lbl = document.getElementById('quoteLabel');

    el.classList.add('fading');
    lbl.style.opacity = '0';

    setTimeout(() => {
      el.textContent = f.texto;
      lbl.textContent = f.label;
      el.classList.remove('fading');
      setTimeout(() => { lbl.style.opacity = '0.85'; lbl.style.transition = 'opacity 0.5s'; }, 50);
    }, 350);

    frasesLeidas++;
    localStorage.setItem('fl', frasesLeidas);
    document.getElementById('cnt-frases').textContent = frasesLeidas;

    if (navigator.vibrate) navigator.vibrate([40, 25, 70]);
    showToast();
    if (event) spawnRipple(event.clientX, event.clientY);
  }

  let toastTimer;
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2800);
  }

  function spawnRipple(x, y) {
    const c = document.getElementById('rippleContainer');
    const sz = 64;
    const d = document.createElement('div');
    d.className = 'ripple';
    d.style.cssText = `width:${sz}px;height:${sz}px;left:${x-sz/2}px;top:${y-sz/2}px`;
    c.appendChild(d);
    setTimeout(() => d.remove(), 1000);
  }

  let lx=null,ly=null,lz=null,shaking=false;
  window.addEventListener('devicemotion', e => {
    const a = e.accelerationIncludingGravity;
    if (!a) return;
    if (lx===null){lx=a.x;ly=a.y;lz=a.z;return;}
    const d = Math.abs(lx-a.x)+Math.abs(ly-a.y)+Math.abs(lz-a.z);
    if (d>28 && !shaking) {
      shaking=true; getQuote(null);
      setTimeout(()=>{shaking=false;},1600);
    }
    lx=a.x;ly=a.y;lz=a.z;
  });

  if (typeof DeviceMotionEvent!=='undefined' && typeof DeviceMotionEvent.requestPermission==='function') {
    document.querySelector('.btn').addEventListener('click',()=>{
      DeviceMotionEvent.requestPermission().catch(()=>{});
    },{once:true});
  }

  (function(){
    const c=document.getElementById('stars');
    for(let i=0;i<90;i++){
      const s=document.createElement('div'); s.className='star';
      const sz=Math.random()*2+0.4;
      s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*5}s;animation-duration:${2.5+Math.random()*3.5}s;opacity:${Math.random()*0.35+0.07}`;
      c.appendChild(s);
    }
  })();

  (function(){
    const c=document.getElementById('particles');
    for(let i=0;i<18;i++){
      const p=document.createElement('div'); p.className='particle';
      const sz=Math.random()*3+1;
      p.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;animation-duration:${13+Math.random()*18}s;animation-delay:${Math.random()*22}s`;
      c.appendChild(p);
    }
  })();
</script>
</body>
</html>
