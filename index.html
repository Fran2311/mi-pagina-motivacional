<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Recuerda por qué lo haces</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap');

    :root {
      --gold: #c9a84c;
      --gold-light: #f0d080;
      --dark: #080c14;
      --dark-2: #0f1520;
      --dark-3: #151e2e;
      --glass: rgba(255,255,255,0.04);
      --glass-border: rgba(255,255,255,0.08);
      --text: #e8e0d0;
      --text-muted: rgba(232,224,208,0.5);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── FONDO ANIMADO ── */
    .bg-layer {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
    }
    .orb {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
    }
    .orb-1 { width: 500px; height: 500px; background: radial-gradient(circle, #c9a84c, transparent); top: -100px; left: -100px; animation-delay: 0s; }
    .orb-2 { width: 400px; height: 400px; background: radial-gradient(circle, #3a6186, transparent); bottom: -80px; right: -80px; animation-delay: -4s; }
    .orb-3 { width: 300px; height: 300px; background: radial-gradient(circle, #89216b, transparent); top: 40%; left: 50%; animation-delay: -8s; }
    @keyframes drift { from { transform: translate(0,0) scale(1); } to { transform: translate(40px,30px) scale(1.1); } }

    /* Estrellas */
    .stars { position: absolute; inset: 0; }
    .star { position: absolute; border-radius: 50%; background: white; animation: twinkle 3s ease-in-out infinite; }
    @keyframes twinkle { 0%,100%{opacity:0.2;transform:scale(1);} 50%{opacity:0.9;transform:scale(1.4);} }

    /* ── LAYOUT PRINCIPAL ── */
    .page {
      position: relative; z-index: 1;
      max-width: 480px; margin: 0 auto;
      padding: 48px 20px 60px;
      display: flex; flex-direction: column; align-items: center; gap: 40px;
    }

    /* ── HEADER ── */
    .header { text-align: center; }
    .eyebrow {
      font-size: 11px; font-weight: 500; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 14px; opacity: 0;
      animation: fadeUp 0.8s ease 0.2s forwards;
    }
    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 8vw, 38px); font-weight: 700;
      line-height: 1.15; color: var(--text);
      opacity: 0; animation: fadeUp 0.8s ease 0.4s forwards;
    }
    .title em { font-style: italic; color: var(--gold-light); }
    .divider {
      width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent);
      margin: 18px auto 0; opacity: 0; animation: fadeUp 0.8s ease 0.6s forwards;
    }

    /* ── GALERÍA ── */
    .gallery {
      width: 100%; display: grid;
      grid-template-columns: repeat(2, 1fr);
      grid-template-rows: 190px 140px;
      gap: 10px;
      opacity: 0; animation: fadeUp 0.8s ease 0.7s forwards;
    }
    .photo-frame {
      position: relative; overflow: hidden; border-radius: 16px;
      border: 1px solid var(--glass-border);
      cursor: pointer;
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), box-shadow 0.4s;
    }
    .photo-frame:nth-child(1) { grid-row: 1 / 2; border-radius: 22px 14px 14px 22px; }
    .photo-frame:nth-child(2) { grid-row: 1 / 3; border-radius: 14px 22px 22px 14px; }
    .photo-frame:nth-child(3) { grid-row: 2 / 3; border-radius: 14px; }
    .photo-frame:hover { transform: scale(1.04) translateY(-3px); box-shadow: 0 20px 50px rgba(0,0,0,0.7), 0 0 0 1px var(--gold); }
    .photo-frame img {
      width: 100%; height: 100%; object-fit: cover;
      filter: saturate(0.85) contrast(1.05);
      transition: filter 0.4s, transform 0.5s;
    }
    .photo-frame:hover img { filter: saturate(1.1) contrast(1.1); transform: scale(1.08); }
    .photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(8,12,20,0.6) 0%, transparent 50%);
      pointer-events: none;
    }

    /* ── TARJETA DE FRASE ── */
    .quote-card {
      width: 100%; position: relative;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 36px 32px;
      text-align: center;
      overflow: hidden;
      opacity: 0; animation: fadeUp 0.8s ease 0.9s forwards;
    }
    .quote-card::before {
      content: '';
      position: absolute; top: 0; left: 50%; transform: translateX(-50%);
      width: 60%; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
    }
    .quote-card::after {
      content: '';
      position: absolute; inset: 0; border-radius: 24px;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,168,76,0.06), transparent 70%);
      pointer-events: none;
    }
    .quote-icon {
      font-size: 32px; line-height: 1; color: var(--gold);
      opacity: 0.6; margin-bottom: 16px; display: block;
      font-family: Georgia, serif;
    }
    #message {
      font-family: 'Playfair Display', serif;
      font-size: clamp(17px, 4.5vw, 21px);
      font-style: italic; font-weight: 400;
      line-height: 1.55; color: var(--text);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    #message.fading { opacity: 0; transform: translateY(6px); }
    .quote-author {
      margin-top: 16px;
      font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--gold); opacity: 0.8;
    }

    /* ── BOTÓN ── */
    .btn-wrap {
      opacity: 0; animation: fadeUp 0.8s ease 1.1s forwards;
    }
    .btn {
      position: relative; overflow: hidden;
      border: none; border-radius: 50px; cursor: pointer;
      padding: 16px 44px;
      background: linear-gradient(135deg, #a07020, #c9a84c, #e8c862, #c9a84c, #a07020);
      background-size: 200% auto;
      color: var(--dark); font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 500; letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: 0 8px 32px rgba(201,168,76,0.35), 0 2px 8px rgba(0,0,0,0.5);
      transition: transform 0.2s, box-shadow 0.2s, background-position 0.5s;
    }
    .btn:hover { transform: translateY(-2px) scale(1.03); box-shadow: 0 14px 40px rgba(201,168,76,0.5); background-position: right center; }
    .btn:active { transform: scale(0.97); }
    .btn-shine {
      position: absolute; top: -50%; left: -75%; width: 50%; height: 200%;
      background: rgba(255,255,255,0.25); transform: skewX(-20deg);
      transition: left 0.5s;
    }
    .btn:hover .btn-shine { left: 140%; }
    .btn-icon { margin-right: 8px; }

    /* ── HINT SHAKE ── */
    .shake-hint {
      font-size: 12px; letter-spacing: 0.08em; color: var(--text-muted);
      text-align: center; display: flex; align-items: center; gap: 8px;
      opacity: 0; animation: fadeUp 0.8s ease 1.3s forwards;
    }
    .shake-icon { font-size: 18px; animation: shakeDemo 2.5s ease-in-out infinite; }
    @keyframes shakeDemo {
      0%,100%{transform:rotate(0deg);} 20%{transform:rotate(15deg);} 40%{transform:rotate(-15deg);}
      60%{transform:rotate(10deg);} 80%{transform:rotate(-10deg);}
    }

    /* ── TOAST ── */
    .toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--dark-3); border: 1px solid var(--glass-border);
      border-radius: 50px; padding: 12px 24px;
      font-size: 14px; color: var(--gold-light);
      transition: transform 0.4s cubic-bezier(.34,1.56,.64,1), opacity 0.3s;
      opacity: 0; z-index: 99; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── RIPPLE ── */
    .ripple-container { position: fixed; inset: 0; pointer-events: none; z-index: 50; }
    .ripple {
      position: absolute; border-radius: 50%;
      border: 2px solid var(--gold); opacity: 0.7;
      animation: rippleAnim 0.8s ease-out forwards;
    }
    @keyframes rippleAnim {
      from { transform: scale(0); opacity: 0.7; }
      to { transform: scale(6); opacity: 0; }
    }

    /* ── ANIMACIONES DE ENTRADA ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--dark); }
    ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; }
  </style>
</head>
<body>

<!-- Fondo -->
<div class="bg-layer">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="stars" id="stars"></div>
</div>

<!-- Ripples -->
<div class="ripple-container" id="rippleContainer"></div>

<!-- Toast -->
<div class="toast" id="toast">✦ Nueva motivación cargada</div>

<!-- Contenido -->
<div class="page">

  <div class="header">
    <p class="eyebrow">✦ Tu momento de fuerza</p>
    <h1 class="title">Recuerda por qué<br><em>lo haces</em></h1>
    <div class="divider"></div>
  </div>

  <div class="gallery">
    <div class="photo-frame">
      <img src="fotos/WhatsApp Image 2026-03-25 at 4.21.33 PM.jpeg" alt="Foto 1" loading="lazy">
      <div class="photo-overlay"></div>
    </div>
    <div class="photo-frame">
      <img src="fotos/WhatsApp Image 2026-03-25 at 4.21.34 PM.jpeg" alt="Foto 4" loading="lazy">
      <div class="photo-overlay"></div>
    </div>
    <div class="photo-frame">
      <img src="fotos/WhatsApp Image 2026-03-25 at 4.21.33 PM (1).jpeg" alt="Foto 2" loading="lazy">
      <div class="photo-overlay"></div>
    </div>
  </div>

  <div class="quote-card">
    <span class="quote-icon">"</span>
    <p id="message">Agita tu teléfono para recibir motivación 💪</p>
    <p class="quote-author" id="quoteAuthor"></p>
  </div>

  <div class="btn-wrap">
    <button class="btn" onclick="getQuote(event)">
      <div class="btn-shine"></div>
      <span class="btn-icon">✦</span> Dame motivación
    </button>
  </div>

  <div class="shake-hint">
    <span class="shake-icon">📳</span>
    Agita tu teléfono para una frase aleatoria
  </div>

</div>

<script>
  // ── FRASES (sin API externa) ──
  const frases = [
    { texto: "El éxito no es el final, el fracaso no es fatal: lo que cuenta es el coraje de continuar.", autor: "Winston Churchill" },
    { texto: "No cuentes los días, haz que los días cuenten.", autor: "Muhammad Ali" },
    { texto: "La única forma de hacer un gran trabajo es amar lo que haces.", autor: "Steve Jobs" },
    { texto: "Cree que puedes y ya estarás a mitad del camino.", autor: "Theodore Roosevelt" },
    { texto: "Tu tiempo es limitado, no lo malgastes viviendo la vida de otro.", autor: "Steve Jobs" },
    { texto: "El único lugar donde el éxito viene antes que el trabajo es en el diccionario.", autor: "Vidal Sassoon" },
    { texto: "Cuando todo parezca ir en tu contra, recuerda que el avión despega contra el viento.", autor: "Henry Ford" },
    { texto: "No esperes. El momento nunca será perfecto.", autor: "Napoleón Hill" },
    { texto: "Cada día es una nueva oportunidad para cambiar tu vida.", autor: "" },
    { texto: "Lo que no te destruye, te hace más fuerte.", autor: "Friedrich Nietzsche" },
    { texto: "El camino de mil millas comienza con un solo paso.", autor: "Lao-Tsé" },
    { texto: "Hazlo con pasión o no lo hagas en absoluto.", autor: "" },
    { texto: "El sacrificio de hoy es el éxito de mañana.", autor: "" },
    { texto: "No hay nada imposible para quien lo intenta.", autor: "Alejandro Magno" },
    { texto: "La disciplina es el puente entre metas y logros.", autor: "Jim Rohn" },
    { texto: "Cada adversidad trae consigo la semilla de un beneficio equivalente.", autor: "Napoleón Hill" },
    { texto: "Sueña en grande, trabaja duro, mantente enfocado.", autor: "" },
    { texto: "El dolor es temporal. Rendirse dura para siempre.", autor: "Lance Armstrong" },
    { texto: "Lo mejor está por venir.", autor: "" },
    { texto: "Tú tienes poder sobre tu mente, no sobre los eventos externos. Date cuenta de esto y encontrarás la fuerza.", autor: "Marco Aurelio" },
    { texto: "El éxito es la suma de pequeños esfuerzos repetidos día tras día.", autor: "Robert Collier" },
    { texto: "No importa lo lento que vayas, siempre que no te detengas.", autor: "Confucio" },
    { texto: "Primero resuelve el problema, luego escribe el código.", autor: "" },
    { texto: "La grandeza no es una función del destino. Es una cuestión de elección consciente.", autor: "Jim Collins" },
    { texto: "Las personas que están lo suficientemente locas como para creer que pueden cambiar el mundo, son quienes lo hacen.", autor: "Steve Jobs" },
  ];

  let ultimoIndice = -1;

  function getQuote(event) {
    let idx;
    do { idx = Math.floor(Math.random() * frases.length); } while (idx === ultimoIndice);
    ultimoIndice = idx;
    const frase = frases[idx];

    const el = document.getElementById('message');
    const autor = document.getElementById('quoteAuthor');

    el.classList.add('fading');
    autor.style.opacity = '0';

    setTimeout(() => {
      el.textContent = frase.texto;
      autor.textContent = frase.autor ? '— ' + frase.autor : '';
      el.classList.remove('fading');
      autor.style.opacity = '1';
      autor.style.transition = 'opacity 0.5s';
    }, 300);

    if (navigator.vibrate) navigator.vibrate([50, 30, 80]);
    showToast();
    if (event) spawnRipple(event.clientX, event.clientY);
  }

  // ── TOAST ──
  let toastTimeout;
  function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => t.classList.remove('show'), 2500);
  }

  // ── RIPPLE ──
  function spawnRipple(x, y) {
    const container = document.getElementById('rippleContainer');
    const size = 60;
    const div = document.createElement('div');
    div.className = 'ripple';
    div.style.cssText = `width:${size}px;height:${size}px;left:${x - size/2}px;top:${y - size/2}px`;
    container.appendChild(div);
    setTimeout(() => div.remove(), 900);
  }

  // ── SHAKE ──
  let lastX = null, lastY = null, lastZ = null, shaking = false;
  window.addEventListener('devicemotion', (e) => {
    const acc = e.accelerationIncludingGravity;
    if (!acc) return;
    if (lastX === null) { lastX = acc.x; lastY = acc.y; lastZ = acc.z; return; }
    const delta = Math.abs(lastX - acc.x) + Math.abs(lastY - acc.y) + Math.abs(lastZ - acc.z);
    if (delta > 28 && !shaking) {
      shaking = true;
      getQuote(null);
      setTimeout(() => { shaking = false; }, 1500);
    }
    lastX = acc.x; lastY = acc.y; lastZ = acc.z;
  });

  // Solicitar permiso en iOS 13+
  if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
    document.querySelector('.btn').addEventListener('click', () => {
      DeviceMotionEvent.requestPermission().catch(() => {});
    }, { once: true });
  }

  // ── ESTRELLAS ──
  (function createStars() {
    const container = document.getElementById('stars');
    for (let i = 0; i < 80; i++) {
      const s = document.createElement('div');
      s.className = 'star';
      const size = Math.random() * 2 + 0.5;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        left:${Math.random()*100}%;
        top:${Math.random()*100}%;
        animation-delay:${Math.random()*4}s;
        animation-duration:${2 + Math.random()*3}s;
        opacity:${Math.random()*0.5 + 0.1};
      `;
      container.appendChild(s);
    }
  })();
</script>
</body>
</html>
